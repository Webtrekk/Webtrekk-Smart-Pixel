version: '3.1'

services:
  phoenix:
      build:
          context: .
      container_name: phoenix
      ports:
          - "4000:4000"
          - "4001:4001"
      networks:
          - mapp
      volumes:
          - ../:/app
      command: bash -c "
          cd /app && make run_phoenix_inside_docker
          "
networks:
    mapp:
